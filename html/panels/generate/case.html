<div class="tool-panel" id="panel-case">
    <div class="mb-8">
        <div class="label">输入文本</div>
        <textarea class="json-input" id="caseInput" placeholder="hello world from Java"></textarea>
    </div>
    <div class="toolbar">
        <button onclick="caseConvert('camel')">camelCase</button>
        <button class="outline" onclick="caseConvert('pascal')">PascalCase</button>
        <button class="outline" onclick="caseConvert('snake')">snake_case</button>
        <button class="outline" onclick="caseConvert('kebab')">kebab-case</button>
        <button class="outline" onclick="caseConvert('upper')">UPPER_CASE</button>
        <button class="outline" onclick="caseConvert('lower')">lower case</button>
    </div>
    <div class="copy-wrap">
        <div class="label">输出</div>
        <button class="copy-btn" onclick="copyText('caseOutput')">复制</button>
        <div class="output-box" id="caseOutput"></div>
    </div>
</div>
