<div class="tool-panel" id="panel-urlparser">
    <div class="stomp-block">
        <div class="stomp-block-title">URL 解析</div>
        <div class="flex gap-6 mb-8" style="align-items:center">
            <input id="urlparserInput"
                   placeholder="https://user:pass@example.com:8080/path/to?a=1&b=2#hash"
                   style="flex:1" type="text">
            <button onclick="urlParserParse()">解析</button>
            <button class="outline" onclick="urlParserFillSample()">示例</button>
        </div>
        <div class="copy-wrap">
            <div class="label">解析结果</div>
            <button class="copy-btn" onclick="copyText('urlparserOutput')">复制</button>
            <div class="output-box" id="urlparserOutput" style="min-height:180px">点击「解析」查看结果</div>
        </div>
    </div>

    <div class="stomp-block">
        <div class="stomp-block-title">URL 编码 / 解码</div>
        <textarea class="api-body-input" id="urlEncInput"
                  placeholder="输入待编码或待解码字符串"></textarea>
        <div class="toolbar" style="margin-top:8px;margin-bottom:0">
            <button onclick="urlEncEncode()">编码 (encodeURIComponent)</button>
            <button class="outline" onclick="urlEncDecode()">解码 (decodeURIComponent)</button>
            <button class="outline" onclick="urlEncEncodeUri()">完整 URL 编码</button>
            <button class="outline" onclick="urlEncDecodeUri()">完整 URL 解码</button>
        </div>
        <div class="copy-wrap" style="margin-top:8px">
            <div class="label">结果</div>
            <button class="copy-btn" onclick="copyText('urlEncOutput')">复制</button>
            <div class="output-box" id="urlEncOutput" style="min-height:80px"></div>
        </div>
    </div>
</div>
