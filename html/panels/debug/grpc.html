<div class="tool-panel" id="panel-grpc">
    <div class="tab-bar">
        <div class="tab active" onclick="grpcSwitchTab(this,'meta')">Metadata 构造</div>
        <div class="tab" onclick="grpcSwitchTab(this,'pb')">Protobuf 解码</div>
        <div class="tab" onclick="grpcSwitchTab(this,'status')">状态码速查</div>
    </div>

    <div class="tab-content active" id="grpc-tab-meta">
        <div class="stomp-block">
            <div class="stomp-block-title">请求元数据 (Metadata)
                <span class="stomp-tip">gRPC HTTP/2 自定义 header 列表</span>
            </div>
            <div class="api-kv-header">
                <span class="api-kv-key">Key</span>
                <span class="api-kv-val">Value</span>
                <span class="api-kv-act"></span>
            </div>
            <div id="grpcMetaList"></div>
            <button class="outline sm" onclick="grpcAddMeta()" style="margin-top:4px">+ 添加 Metadata</button>
        </div>

        <div class="stomp-block">
            <div class="stomp-block-title">目标服务地址</div>
            <div class="flex gap-6" style="align-items:center;flex-wrap:wrap">
                <input id="grpcEndpoint" placeholder="https://grpc.example.com/helloworld.Greeter/SayHello"
                       style="flex:1;min-width:280px" type="text">
                <span class="label" style="margin:0">Content-Type</span>
                <select id="grpcCt" style="width:240px">
                    <option value="application/grpc">application/grpc (标准)</option>
                    <option selected value="application/grpc+proto">application/grpc+proto (Protobuf)</option>
                    <option value="application/grpc-web">application/grpc-web</option>
                </select>
            </div>
        </div>

        <div class="toolbar">
            <button onclick="grpcBuildMeta()">生成 gRPC 请求命令</button>
        </div>

        <div class="copy-wrap">
            <div class="label">输出</div>
            <button class="copy-btn" onclick="copyText('grpcMetaOutput')">复制</button>
            <pre class="output-box" id="grpcMetaOutput"
                 style="min-height:160px;max-height:400px;white-space:pre-wrap;word-break:break-all">点击「生成 gRPC 请求命令」查看结果</pre>
        </div>
    </div>

    <div class="tab-content" id="grpc-tab-pb">
        <div class="stomp-block">
            <div class="stomp-block-title">Base64 编码 Protobuf
                <span class="stomp-tip">来自 Wireshark / curl 抓包，可解码查看字段片段</span>
            </div>
            <textarea class="api-body-input" id="grpcPbInput"
                      placeholder="CghIb2xsbyBNAAQggICA5aGm5pysf+axguaXtu+4jyA="></textarea>
            <div class="toolbar" style="margin-top:8px;margin-bottom:0">
                <button onclick="grpcParsePb()">解析</button>
                <button class="outline" onclick="grpcParsePbHex()">尝试 Hex 模式</button>
                <button class="outline" onclick="document.getElementById('grpcPbInput').value=''">清空</button>
            </div>
        </div>

        <div class="copy-wrap">
            <div class="label">解析结果 (Wire Format)</div>
            <button class="copy-btn" onclick="copyText('grpcPbOutput')">复制</button>
            <pre class="output-box" id="grpcPbOutput"
                 style="min-height:200px;max-height:500px;white-space:pre-wrap;word-break:break-all">输入 Base64 字符串后点击「解析」</pre>
        </div>
    </div>

    <div class="tab-content" id="grpc-tab-status">
        <div class="grpc-status-table">
            <table>
                <thead>
                <tr>
                    <th style="width:60px">Code</th>
                    <th style="width:200px">Name</th>
                    <th>说明</th>
                </tr>
                </thead>
                <tbody id="grpcStatusTbody"></tbody>
            </table>
        </div>
    </div>
</div>
