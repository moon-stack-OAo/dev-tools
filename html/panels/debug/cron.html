<div class="tool-panel" id="panel-cron">
    <div class="flex gap-6 mb-8" style="align-items:center;flex-wrap:wrap">
        <div class="flex-1">
            <div class="label">Cron 表达式 (6 段 秒 分 时 日 月 周)</div>
            <div style="display:flex;gap:4px">
                <input id="cronInput" placeholder="*/5 * * * *" style="width:240px;font-family:var(--font)"
                       type="text"
                       value="*/5 * * * *">
                <button onclick="cronCopyExpr()" style="padding:3px 10px;font-size:11px;flex-shrink:0">复制
                </button>
                <button class="outline" onclick="cronParse()"
                        style="padding:3px 10px;font-size:11px;flex-shrink:0">解析
                </button>
            </div>
        </div>
        <div style="width:120px">
            <div class="label">生成次数</div>
            <input id="cronCount" max="20" min="1" style="width:60px" type="number" value="5">
        </div>
    </div>

    <div class="cron-fields" id="cronFields"></div>

    <div class="toolbar">
        <button class="outline" onclick="cronPreset('*/5 * * * *')">每5分钟</button>
        <button class="outline" onclick="cronPreset('0 * * * *')">每小时</button>
        <button class="outline" onclick="cronPreset('0 0 * * *')">每天凌晨</button>
        <button class="outline" onclick="cronPreset('0 0 * * 1')">每周一</button>
        <button class="outline" onclick="cronPreset('0 0 1 * *')">每月1号</button>
    </div>

    <div class="cron-description" id="cronDesc"
         style="padding:8px 12px;font-size:13px;color:var(--text-dim);margin-bottom:8px"></div>

    <div class="copy-wrap">
        <div class="label">下次执行时间</div>
        <button class="copy-btn" onclick="copyText('cronOutput')">复制</button>
        <div class="output-box" id="cronOutput"></div>
    </div>
</div>
