<div class="tool-panel" id="panel-regex">
    <div class="flex gap-6 mb-8" style="align-items:center;flex-wrap:wrap">
        <div class="flex-1">
            <div class="label">正则表达式</div>
            <input id="regexPattern" placeholder="\d+" type="text">
        </div>
        <div style="width:130px">
            <div class="label">标志</div>
            <input class="regex-flags" id="regexFlags" placeholder="gim" type="text" value="g">
        </div>
    </div>
    <div class="mb-8">
        <div class="label">测试文本</div>
        <textarea class="json-input" id="regexText" placeholder="输入要匹配的文本"></textarea>
    </div>
    <div class="toolbar">
        <button onclick="regexTest()">测试匹配</button>
    </div>
    <div class="copy-wrap">
        <div class="label">结果</div>
        <button class="copy-btn" onclick="copyText('regexOutput')">复制</button>
        <div class="output-box" id="regexOutput"></div>
    </div>
</div>

<div class="tool-panel" id="panel-diff">
    <div class="diff-container mb-8">
        <div class="flex-1">
            <div class="label">文本 A (原始)</div>
            <textarea id="diffA" placeholder="原始内容" style="height:250px"></textarea>
        </div>
        <div class="flex-1">
            <div class="label">文本 B (修改后)</div>
            <textarea id="diffB" placeholder="修改后的内容" style="height:250px"></textarea>
        </div>
    </div>
    <div class="toolbar">
        <button onclick="doDiff()">对比</button>
        <label style="font-size:12px;color:var(--text-dim)">
            <input id="diffIgnoreCase" style="accent-color:var(--accent)" type="checkbox"> 忽略大小写
        </label>
    </div>
    <div class="label mt-8">差异结果</div>
    <div class="diff-output" id="diffOutput"></div>
</div>

<div class="tool-panel" id="panel-stats">
    <div class="mb-8">
        <div class="label">输入文本</div>
        <textarea class="json-input" id="statsInput" oninput="statsCalc()"
                  placeholder="输入文本以统计"></textarea>
    </div>
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="stat-val" id="statsChars">0</div>
            <div class="stat-label">字符数 (含空格)</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="statsCharsNoSpace">0</div>
            <div class="stat-label">字符数 (无空格)</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="statsWords">0</div>
            <div class="stat-label">单词数</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="statsLines">0</div>
            <div class="stat-label">行数</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="statsBytes">0</div>
            <div class="stat-label">字节数 (UTF-8)</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="statsCJK">0</div>
            <div class="stat-label">中文字符</div>
        </div>
    </div>
</div>

<div class="tool-panel" id="panel-csv">
    <div class="flex gap-6 mb-8" style="align-items:center;flex-wrap:wrap">
        <div>
            <div class="label">分隔符</div>
            <select id="csvDelim" style="width:100px">
                <option value=",">逗号 (,)</option>
                <option value="\t">Tab</option>
                <option value=";">分号 (;)</option>
                <option value="|">竖线 (|)</option>
            </select>
        </div>
        <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-dim)">
            <input checked id="csvHeader" style="accent-color:var(--accent)" type="checkbox"> 首行为表头
        </label>
    </div>
    <div class="mb-8">
        <div class="label">输入 CSV</div>
        <textarea class="json-input" id="csvInput"
                  placeholder="name,age,city&#10;张三,25,杭州&#10;李四,30,北京"></textarea>
    </div>
    <div class="toolbar">
        <button onclick="csvFormat()">格式化预览</button>
    </div>
    <div class="output-box" id="csvOutput"
         style="min-height:80px;max-height:500px;overflow:auto;padding:0"></div>
</div>

<div class="tool-panel" id="panel-regexref">
    <div class="mb-8">
        <div class="label">常用正则表达式 (点击行复制)</div>
        <div id="regexRefContent"></div>
    </div>
</div>
