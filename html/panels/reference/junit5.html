<div class="tool-panel" id="panel-junit5">
    <div class="ref-search-bar">
        <div class="ref-search-input-wrap">
            <i class="bi bi-search search-icon"></i>
            <input
                    id="junit5Search"
                    oninput="
                    junit5Search();
                    toggleRefClear(this);
                "
                    placeholder="搜索注解或方法..."
                    type="text"
            />
            <button class="ref-search-clear" onclick="clearRefSearch(this)" type="button">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>
    <div id="junit5Content"></div>
</div>
