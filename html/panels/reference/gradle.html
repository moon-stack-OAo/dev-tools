<div class="tool-panel" id="panel-gradle">
    <div class="ref-search-bar">
        <div class="label"><i class="bi bi-search"></i>Gradle 命令速查 (点击复制)</div>
        <div class="ref-search-input-wrap">
            <i class="bi bi-search search-icon"></i>
            <input id="gradleSearch" oninput="gradleSearch();toggleRefClear(this)" placeholder="搜索命令或描述..." type="text">
            <button class="ref-search-clear" onclick="clearRefSearch(this)" type="button"><i class="bi bi-x-lg"></i></button>
        </div>
    </div>
    <div id="gradleContent"></div>
</div>
