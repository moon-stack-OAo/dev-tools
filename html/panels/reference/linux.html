<div class="tool-panel" id="panel-linux">
    <div class="ref-search-bar">
        <div class="ref-search-input-wrap">
            <i class="bi bi-search search-icon"></i>
            <input
                    id="linuxSearch"
                    oninput="
                    linuxSearch();
                    toggleRefClear(this);
                "
                    placeholder="搜索命令或描述..."
                    type="text"
            />
            <button class="ref-search-clear" onclick="clearRefSearch(this)" type="button">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>
    <div id="linuxContent"></div>
</div>
