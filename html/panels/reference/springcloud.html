<div class="tool-panel" id="panel-springcloud">
    <div class="ref-search-bar" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        <div class="ref-search-input-wrap" style="flex:1;max-width:400px">
            <i class="bi bi-search search-icon"></i>
            <input id="springcloudSearch" oninput="springcloudSearch();toggleRefClear(this)" placeholder="搜索注解、配置项、说明..."
                   type="text">
            <button class="ref-search-clear" onclick="clearRefSearch(this)" type="button"><i class="bi bi-x-lg"></i></button>
        </div>
        <div id="springcloudTabs" style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="sm outline active" data-cat="all" onclick="springcloudFilter('all')">全部</button>
            <button class="sm outline" data-cat="Nacos" onclick="springcloudFilter('Nacos')">Nacos</button>
            <button class="sm outline" data-cat="Sentinel" onclick="springcloudFilter('Sentinel')">Sentinel</button>
            <button class="sm outline" data-cat="Seata" onclick="springcloudFilter('Seata')">Seata</button>
            <button class="sm outline" data-cat="Gateway" onclick="springcloudFilter('Gateway')">Gateway</button>
            <button class="sm outline" data-cat="OpenFeign" onclick="springcloudFilter('OpenFeign')">OpenFeign</button>
            <button class="sm outline" data-cat="Sleuth" onclick="springcloudFilter('Sleuth')">Sleuth</button>
        </div>
    </div>
    <div id="springcloudContent"></div>
</div>
