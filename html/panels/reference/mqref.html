<div class="tool-panel" id="panel-mqref">
    <div class="ref-search-bar">
        <div class="ref-search-bar-tabs">
            <div class="ref-search-input-wrap">
                <i class="bi bi-search search-icon"></i>
                <input
                        id="mqrefSearch"
                        oninput="
                        mqrefSearch();
                        toggleRefClear(this);
                    "
                        placeholder="搜索中间件配置 / 概念 / 示例..."
                        type="text"
                />
                <button class="ref-search-clear" onclick="clearRefSearch(this)" type="button">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div id="mqrefTabs" style="display: flex; gap: 6px; flex-wrap: wrap">
                <button class="sm outline active" data-tab="kafka" onclick="mqrefSwitchTab('kafka')">Kafka</button>
                <button class="sm outline" data-tab="rabbitmq" onclick="mqrefSwitchTab('rabbitmq')">RabbitMQ</button>
                <button class="sm outline" data-tab="rocketmq" onclick="mqrefSwitchTab('rocketmq')">RocketMQ</button>
            </div>
        </div>
        <div id="mqrefCats" style="display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px"></div>
    </div>
    <div id="mqrefList"></div>
</div>
