<div class="tool-panel" id="panel-ideakeys">
    <div class="ref-search-bar">
        <div class="ref-search-input-wrap">
            <i class="bi bi-search search-icon"></i>
            <input
                    id="ideakeysSearch"
                    oninput="
                    ideakeysSearch();
                    toggleRefClear(this);
                "
                    placeholder="搜索快捷键或功能..."
                    type="text"
            />
            <button class="ref-search-clear" onclick="clearRefSearch(this)" type="button">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>
    <div id="ideakeysContent"></div>
</div>
