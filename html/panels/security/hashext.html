<!-- Hash Extensible -->
<div class="tool-panel" id="panel-hashext">
    <div class="mb-8">
        <div class="label">输入</div>
        <textarea class="json-input" id="hashextInput"
                  placeholder="要计算多种Hash 的文本"></textarea>
    </div>
    <div class="toolbar">
        <button onclick="hashextCompute()">计算全部</button>
        <button class="outline" onclick="hashextClear()"
                style="margin-left:auto;border-color:var(--danger);color:var(--danger)">清空
        </button>
    </div>
    <div id="hashextResults"></div>
</div>
