<div class="tool-panel" id="panel-yaml">
    <div class="toolbar">
        <button onclick="yamlFormat()">格式化 YAML</button>
        <button class="outline" onclick="yamlToJson()">YAML → JSON</button>
        <button class="outline" onclick="jsonToYaml()">JSON → YAML</button>
    </div>
    <div class="mb-8">
        <div class="label">输入</div>
        <textarea class="json-input" id="yamlInput" placeholder="server:&#10;  port: 8080"></textarea>
    </div>
    <div class="copy-wrap">
        <div class="label">输出</div>
        <button class="copy-btn" onclick="copyText('yamlOutput')">复制</button>
        <div class="output-box" id="yamlOutput"></div>
    </div>
</div>
