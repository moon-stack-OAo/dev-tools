<div class="tool-panel" id="panel-xml">
    <div class="toolbar">
        <button onclick="xmlFormat()">格式化</button>
        <button class="outline" onclick="xmlCompress()">压缩</button>
        <button class="outline" onclick="xmlValidate()">验证</button>
    </div>
    <div class="mb-8">
        <div class="label">输入 XML</div>
        <textarea class="json-input" id="xmlInput"
                  placeholder="<root><item id='1'>hello</item></root>"></textarea>
    </div>
    <div class="copy-wrap">
        <div class="label">输出</div>
        <button class="copy-btn" onclick="copyText('xmlOutput')">复制</button>
        <div class="output-box" id="xmlOutput"></div>
    </div>
</div>
