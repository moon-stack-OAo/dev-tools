<div class="tool-panel" id="panel-json">
    <div class="toolbar">
        <button onclick="jsonFormat()">格式化</button>
        <button class="outline" onclick="jsonCompress()">压缩</button>
        <button class="outline" onclick="jsonValidate()">验证</button>
    </div>
    <div class="mb-8">
        <div class="label">输入 JSON</div>
        <textarea class="json-input" id="jsonInput" placeholder='{"name":"test","version":1}'></textarea>
    </div>
    <div class="copy-wrap">
        <div class="label">输出</div>
        <button class="copy-btn" onclick="copyText('jsonOutput')">复制</button>
        <div class="output-box" id="jsonOutput"></div>
    </div>
</div>
