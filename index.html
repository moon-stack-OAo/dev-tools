<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Java 开发工具箱</title>
    <script src="./lib/js-yaml.min.js"></script>
    <script src="./lib/diff.min.js"></script>
    <script src="./lib/md5.min.js"></script>
    <script src="./lib/sql-formatter.min.js"></script>
    <script src="./lib/bcrypt.min.js"></script>
    <script src="./lib/sm2.min.js"></script>
    <script src="./lib/sm3.min.js"></script>
    <script src="./lib/sm4.min.js"></script>
    <script src="./lib/jsonpath.min.js"></script>
    <script src="./lib/ajv.min.js"></script>
    <script src="./lib/fxp.min.js"></script>
    <script src="./lib/ua-parser.min.js"></script>
    <script src="./lib/marked.min.js"></script>
    <script src="./lib/js-beautify.min.js"></script>
    <script src="./lib/qrcode.min.js"></script>
    <script src="./lib/jsqr.min.js"></script>
    <script src="./lib/jszip.min.js"></script>
    <script src="./lib/asn1js.min.js"></script>
    <script src="./lib/pkijs.min.js"></script>
    <link href="css/base.css" rel="stylesheet">
    <link href="css/layout.css" rel="stylesheet">
    <link href="css/format.css" rel="stylesheet">
    <link href="css/encode.css" rel="stylesheet">
    <link href="css/security.css" rel="stylesheet">
    <link href="css/generate.css" rel="stylesheet">
    <link href="css/text.css" rel="stylesheet">
    <link href="css/debug.css" rel="stylesheet">
    <link href="css/reference.css" rel="stylesheet">
</head>

<body>
<div class="app" id="app">
    <div class="main" id="mainContainer">
        <div class="main-header">
            <div class="home-btn" id="homeBtn" onclick="goHome()" style="display:none" title="返回首页"><i
                    class="bi bi-chevron-left"></i></div>
            <div class="header-home-title" id="headerHomeTitle">
                <span class="hh-title">DevTools</span>
                <span class="hh-sub">86 个工具 · 7 大分类 · 纯前端本地处理</span>
            </div>
            <div class="breadcrumb" id="breadcrumb"></div>
            <div class="home-search-wrap">
                <span class="search-icon"><i class="bi bi-search"></i></span>
                <label for="homeSearch"></label>
                <input id="homeSearch" oninput="onHomeSearchInput()" placeholder="搜索工具..." type="text">
            </div>
        </div>

        <div id="panels-loading" style="padding:60px 24px;text-align:center;color:var(--text-muted);font-size:13px">
            正在加载工具模块...
        </div>

        <div id="panels-container" style="display:none">
            <div class="tool-panel home-panel active" id="panel-home">
                <div class="home-body">
                    <div class="home-cat-anchors" id="homeCatAnchors"></div>
                    <div class="home-grid" id="homeGrid"></div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <span id="statusText">就绪</span>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
</body>

</html>
