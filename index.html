<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Java 开发工具箱</title>
    <link href="public/favicon.svg" rel="icon" type="image/svg+xml">
    <!-- 第三方库已改为按需懒加载,见 js/app.js 中的 toolLibs / loadLib -->
    <link href="css/base.css" rel="stylesheet">
    <link href="css/layout.css" rel="stylesheet">
    <link href="css/format.css" rel="stylesheet">
    <link href="css/encode.css" rel="stylesheet">
    <link href="css/security.css" rel="stylesheet">
    <link href="css/generate.css" rel="stylesheet">
    <link href="css/codegen.css" rel="stylesheet">
    <link href="css/text.css" rel="stylesheet">
    <link href="css/debug.css" rel="stylesheet">
    <link href="css/reference.css" rel="stylesheet">
</head>

<body>
<div class="app" id="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title"><i class="bi bi-grid-3x3-gap"></i> 分类</span>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
            <button class="sidebar-toggle" id="sidebarToggle" title="折叠侧边栏" type="button">
                <i class="bi bi-chevron-double-left"></i>
            </button>
        </div>
    </aside>
    <div class="main" id="mainContainer">
        <div class="main-header">
            <div class="home-btn" id="homeBtn" onclick="goHome()" style="display:none" title="返回首页"><i
                    class="bi bi-chevron-left"></i></div>
            <div class="header-home-title" id="headerHomeTitle">
                <span class="hh-title"><i class="bi bi-tools"
                                          style="margin-right:6px;font-size:18px"></i>DevTools</span>
                <span class="hh-sub">97 个工具 · 8 大分类 · 纯前端本地处理</span>
            </div>
            <div class="breadcrumb" id="breadcrumb"></div>
            <div class="home-search-wrap">
                <span class="search-icon"><i class="bi bi-search"></i></span>
                <label for="homeSearch"></label>
                <input id="homeSearch" oninput="onHomeSearchInput()" placeholder="搜索工具..." type="search">
            </div>
            <div class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题 (Ctrl+J)"><i
                    class="bi bi-moon-stars-fill" id="themeIcon"></i></div>
        </div>

        <div id="panels-loading" style="padding:60px 24px;text-align:center;color:var(--text-muted);font-size:13px">
            正在加载工具模块...
        </div>

        <div id="panels-container" style="display:none">
            <div class="tool-panel home-panel active" id="panel-home">
                <div class="home-body">
                    <div class="home-cat-anchors" id="homeCatAnchors"></div>
                    <div class="home-grid" id="homeGrid"></div>
                </div>
            </div>
            <button class="back-to-top" id="backToTop" title="返回顶部"><i class="bi bi-chevron-up"></i></button>
        </div>

        <div class="status-bar">
            <span id="statusText">就绪</span>
        </div>
    </div>
</div>

<div class="loading-bar" id="loadingBar"></div>
<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
</body>

</html>
